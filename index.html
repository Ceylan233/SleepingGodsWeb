<!DOCTYPE html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
			<title>沉睡的神祇</title>
			<link rel="stylesheet" href="./style.css">

</head>
			<body>
				
					<div id="toast"></div>
					<div class="container">
						<div class="title">沉睡的神祇</div>
						<!-- 输入 -->
						<div class="input-box">
							<input id="inputText" placeholder="输入故事书编号 (例如 2.1)">
								<button class="clear-btn" onclick="inputText.value=''">✕</button>
							</div>
							<button class="btn" id="btnSearch">查找</button>
							<!-- 语音播放器 -->
							<div class="card">
								<div class="card-title">语音播放器</div>
								<!-- ⭐ 精度优化 -->
								<input type="range" id="seekBar" step="1">
									<div id="timeText" class="time">00:00 / 00:00</div>
									<div class="circle-btn" id="btnPlay" onclick="togglePlay()">▶</div>
								</div>
								<!-- BGM -->
								<div class="card">
									<div class="card-title">背景音乐</div>
									<div class="circle-btn" id="btnBgmPlay" onclick="toggleBgm()">▶</div>
									<!-- ⭐ 精度优化 -->
									<input type="range" id="bgmSeekBar" step="1">
										<div id="bgmTime" class="time">00:00 / 00:00</div>
										<div id="volumeText" class="center">音量 50%</div>
										<input type="range" id="volumeBar">
											<div class="center">
												<label>
													<input type="checkbox" id="loopSwitch"> 循环播放
    </label>
												</div>
											</div>
											<div id="noticeText" class="notice">公告</div>
										</div>
										<script src="./app.js"></script>
									</body>
								</html>
