<!DOCTYPE html>
<html lang="zh">
	<head>
		<meta charset="UTF-8">
		<title>游戏选择</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				height: 100%;
				background: #0b0f14;
				font-family: "Microsoft YaHei", Arial, sans-serif;
				overflow: hidden;
			}

			.home {
				height: 100vh;
				display: flex;
				flex-direction: column;
			}

			.item {
				flex: 1;
				position: relative;
				overflow: hidden;
				cursor: pointer;
				background: #000;
				border-bottom: 1px solid rgba(255, 255, 255, 0.08);
			}

			.bg {
				position: absolute;
				inset: -30px;
				background-size: cover;
				background-position: center;
				filter: blur(28px) brightness(0.5);
				transform: scale(1.12);
				transition: transform 0.6s ease, filter 0.6s ease;
			}

			.item::before {
				content: "";
				position: absolute;
				inset: 0;
				background:
					linear-gradient(to right, rgba(5, 8, 12, 0.78) 0%, rgba(5, 8, 12, 0.36) 38%, rgba(5, 8, 12, 0.2) 100%);
				z-index: 1;
				pointer-events: none;
			}

			.item::after {
				content: "";
				position: absolute;
				inset: 0;
				background:
					linear-gradient(to top, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.18) 38%, rgba(0, 0, 0, 0) 70%);
				z-index: 2;
				pointer-events: none;
			}

			.content {
				position: relative;
				z-index: 3;
				height: 100%;
				display: flex;
				align-items: center;
				gap: 28px;
				padding: 20px 36px;
			}

			.poster-wrap {
				height: 88%;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				transition: transform 0.5s ease;
			}

			.poster {
				height: 100%;
				width: auto;
				max-width: 220px;
				object-fit: contain;
				border-radius: 14px;
				box-shadow:
					0 18px 40px rgba(0, 0, 0, 0.5),
					0 0 0 1px rgba(255, 255, 255, 0.12);
				transition: transform 0.5s ease, box-shadow 0.5s ease;
			}

			.info {
				display: flex;
				flex-direction: column;
				justify-content: flex-end;
				align-self: flex-end;
				padding-bottom: 10px;
				min-width: 0;
			}

			.title {
				color: #fff;
				font-size: 42px;
				font-weight: 800;
				line-height: 1.1;
				text-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
				margin-bottom: 10px;
			}

			.sub {
				color: rgba(255, 255, 255, 0.75);
				font-size: 16px;
				letter-spacing: 1px;
			}

			.item:hover .bg {
				transform: scale(1.18) translateX(18px);
				filter: blur(22px) brightness(0.62);
			}

			.item:hover .poster-wrap {
				transform: translateX(8px);
			}

			.item:hover .poster {
				transform: scale(1.04) translateX(6px);
				box-shadow:
					0 22px 50px rgba(0, 0, 0, 0.62),
					0 0 0 1px rgba(255, 255, 255, 0.18);
			}

			.item:hover .title {
				transform: translateX(4px);
				transition: transform 0.4s ease;
			}

			@media (max-width: 900px) {
				.content {
					gap: 18px;
					padding: 14px 20px;
				}

				.poster {
					max-width: 150px;
				}

				.title {
					font-size: 28px;
				}

				.sub {
					font-size: 13px;
				}
			}
		</style>
	</head>
	<body>
		<div class="home">
			<div class="item" onclick="go('./SleepingGods/SleepingGods.html')">
				<div class="bg" style="background-image:url('/img/SleepingGods.jpg')"></div>
				<div class="content">
					<div class="poster-wrap">
						<img class="poster" src="/img/SleepingGods.jpg" alt="沉睡的神祇">
					</div>
					<div class="info">
						<div class="title">沉睡的神祇</div>
						<div class="sub">Sleeping Gods</div>
					</div>
				</div>
			</div>

			<div class="item" onclick="go('./空寂之钟/Kongji.html')">
				<div class="bg" style="background-image:url('/img/Kongji.jpg')"></div>
				<div class="content">
					<div class="poster-wrap">
						<img class="poster" src="/img/Kongji.jpg" alt="空寂之钟">
					</div>
					<div class="info">
						<div class="title">空寂之钟</div>
						<div class="sub">Quietbell</div>
					</div>
				</div>
			</div>

			<div class="item" onclick="go('./沙穴之城/Shaxue.html')">
				<div class="bg" style="background-image:url('/img/Shaxue.jpg')"></div>
				<div class="content">
					<div class="poster-wrap">
						<img class="poster" src="/img/Shaxue.jpg" alt="沙穴之城">
					</div>
					<div class="info">
						<div class="title">沙穴之城</div>
						<div class="sub">Al-Kahuf</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			function go(url) {
				location.href = url;
			}
		</script>
	</body>
</html>
